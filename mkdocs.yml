site_name: Backfield documentation
site_description: Documentation for the Backfield platform and APIs.
site_url: https://docs.backfield.news

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Platform:
      - platform/index.md
      - Getting Started: platform/getting-started.md
      - Simple Example: platform/simple-example.md
      - Core concepts:
          - Organizations & workspaces: platform/concepts/organizations.md
          - Projects: platform/concepts/projects.md
          - Users & access: platform/concepts/users.md
          - Data model: platform/concepts/content-model.md
      - Agate:
          - platform/agate/index.md
          - Flows: platform/agate/flows.md
          - Nodes:
              - platform/agate/nodes/index.md
              - Inputs: platform/agate/nodes/inputs.md
              - Extractors: platform/agate/nodes/extractors.md
              - Enrichment: platform/agate/nodes/enrichment.md
              - Embedding: platform/agate/nodes/embedding.md
              - Outputs: platform/agate/nodes/outputs.md
              - Flow control: platform/agate/nodes/flow-control.md
          - Runs: platform/agate/runs.md
          - Processed items: platform/agate/processed-items.md
      - Stylebook:
          - platform/stylebook/index.md
          - Entity types: platform/stylebook/entity-types.md
          - Stylebooks & the library: platform/stylebook/stylebooks.md
          - Canonicalization: platform/stylebook/canonicalization.md
          - Mentions & evidence: platform/stylebook/mentions.md
          - Metadata: platform/stylebook/meta.md
          - Connections: platform/stylebook/connections.md
          - Geography: platform/stylebook/geography.md
          - Import & export: platform/stylebook/import-export.md
      - Settings:
